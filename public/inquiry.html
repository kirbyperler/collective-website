<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inquiry | Collective</title>
    <meta name="description" content="Start your Collective inquiry.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css">
    <script src="js/script.js" defer></script>
    <link rel="icon" href="images/collectivelogo1.png" type="image/png">
</head>

<body class="inquiry-page-body">

    <header class="navbar">
        <a href="index.html" class="logo">
            <img src="images/collectivelogo1.png" alt="Collective Logo">
        </a>

        <nav>
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
        </nav>
    </header>

    <main class="subpage inquiry-page">
        <section class="inquiry-hero">
            <p class="section-title">REQUEST AN INTRODUCTION</p>

            <h1>
                Every athlete
                starts with
                a conversation.
            </h1>

            <p>
                Tell us a little about yourself.
                We'll review every inquiry and
                reach out if we believe Collective
                is the right fit.
            </p>
        </section>

        <section class="inquiry-section">
            <div class="inquiry-box">
                <form id="inquiryForm" class="inquiry-form">
                    <input id="firstName" name="firstName" type="text" placeholder="First Name" required>
                    <input id="lastName" name="lastName" type="text" placeholder="Last Name" required>

                    <div class="form-label">Select Role</div>
                    
                    <div class="role-options">
                        <label>
                            <input type="radio" name="role" value="player" required>
                            <span>Player</span>
                        </label>

                        <label>
                            <input type="radio" name="role" value="coach">
                            <span>Coach</span>
                        </label>

                        <label>
                            <input type="radio" name="role" value="advisor">
                            <span>Advisor</span>
                        </label>
                    </div>

                    <div id="positionContainer">

                        <div id="hidden-label" class="form-label">Select Position</div>

                        <div class="position-options">

                            <label>
                                <input type="radio" name="position" value="forward">
                                <span>Forward</span>
                            </label>

                            <label>
                                <input type="radio" name="position" value="defense">
                                <span>Defense</span>
                            </label>

                            <label>
                                <input type="radio" name="position" value="goalie">
                                <span>Goalie</span>
                            </label>

                        </div>

                    </div>

                    <div id="eliteProspectsContainer" style="display:none">
                        <input id="eliteProspects" name="eliteProspects" type="url" placeholder="Elite Prospects Profile URL (optional)">
                    </div>

                    <input id="birthYear" name="birthYear" type="number" placeholder="Birth Year" required>
                    <input id="phoneNumber" name="phoneNumber" type="tel" placeholder="Phone Number" required>
                    <input id="email" name="email" type="email" placeholder="Email" required>

                    <textarea id="goals" name="goals" placeholder="Goals and why you're interested in Collective..." required></textarea>

                    <button type="submit">Submit Inquiry</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <div>
            <h3><img class="footer-logo" src="images/collectivelogo2.png" alt="Collective Logo"></h3>
            <p class="footer-text">Private Development Ecosystem</p>
        </div>

        <div>
            <a href="index.html">Home</a>
        </div>
    </footer>

</body>
</html>
