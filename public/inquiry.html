<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Inquiry | Collective</title>

    <meta name="description"
          content="Start your Collective inquiry.">

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css">

    <script src="js/script.js" defer></script>

    <link rel="icon" href="images/collectivelogo1.png" type="image/png">

</head>

<body>

    <!-- ================= NAVBAR ================= -->

    <header class="navbar">

        <a href="index.html" class="logo">

            <img src="images/collectivelogo1.png"
                 alt="Collective Logo">

        </a>

        <nav>

            <a href="index.html">Home</a>

            <a href="login.html">Login</a>

        </nav>

    </header>



    <!-- ================= HEADER ================= -->

    <section class="inquiry-hero">

        <p class="section-title">

            REQUEST AN INTRODUCTION

        </p>

        <h1>

            Every athlete
            starts with
            a conversation.

        </h1>

        <p>

            Tell us a little about yourself.
            We'll review every inquiry and
            reach out if we believe Collective
            is the right fit.

        </p>

    </section>



    <!-- ================= FORM ================= -->

    <section class="inquiry-section">

        <form
            class="inquiry-form"                 >

            <div class="form-row">

                <div class="input-group">

                    <label for="firstName">

                        First Name *

                    </label>

                    <input
                        type="text"
                        id="firstName"
                        name="firstName"
                        required>

                </div>

                <div class="input-group">

                    <label for="lastName">

                        Last Name *

                    </label>

                    <input
                        type="text"
                        id="lastName"
                        name="lastName"
                        required>

                </div>

            </div>



            <div class="form-row">

                <div class="input-group">

                    <label for="email">

                        Email *

                    </label>

                    <input
                        type="email"
                        id="email"
                        name="email"
                        required>

                </div>

                <div class="input-group">

                    <label for="phone">

                        Phone Number *

                    </label>

                    <input
                        type="tel"
                        id="phone"
                        name="phone"
                        required>

                </div>

            </div>



            <div class="form-row">

                <div class="input-group">

                    <label for="birthYear">

                        Birth Year

                    </label>

                    <input
                        type="number"
                        id="birthYear"
                        name="birthYear">

                </div>

                <div class="input-group">

                    <label for="team">

                        Current Team

                    </label>

                    <input
                        type="text"
                        id="team"
                        name="team">

                </div>

            </div>



            <div class="input-group">

                <label for="position">

                    Position

                </label>

                <input
                    type="text"
                    id="position"
                    name="position">

            </div>



            <div class="input-group">

                <label for="goals">

                    What are your goals?

                </label>

                <textarea
                    id="goals"
                    name="goals"
                    rows="6"
                    placeholder="Tell us about yourself, your goals, and why you're interested in Collective."></textarea>

            </div>



            <button
                type="submit"
                class="hero-button">

                Submit Inquiry

            </button>

        </form>

    </section>



    <!-- ================= FOOTER ================= -->

    <footer>

        <div>

            <h3>

                <img class="footer-logo" src="collectivelogo2.png">

            </h3>

            <p class="footer-text">

                Private Development Ecosystem

            </p>

        </div>

        <div>

            <a href="index.html">

                Home

            </a>

        </div>

    </footer>

</body>

</html>
