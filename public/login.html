<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athlete Portal | Collective</title>
    <meta name="description" content="Collective Athlete Portal">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css">
    <script src="js/script.js" defer></script>
    <link rel="icon" href="images/collectivelogo1.png" type="image/png">
</head>

<body class="login-page-body">

    <header class="navbar">
        <a href="index.html" class="logo">
            <img src="images/collectivelogo1.png" alt="Collective Logo">
        </a>

        <nav>
            <a href="index.html">Home</a>
            <a href="inquiry.html">Inquire</a>
        </nav>
    </header>

    <main class="login-page">
        <div class="login-card">
            <p class="section-title">ATHLETE PORTAL</p>

            <h1>Welcome Back.</h1>

            <p class="login-description">
                Sign in to access your development
                resources, training information,
                and athlete profile.
            </p>

            <form class="login-form" id="loginForm">
                <div class="input-group">
                    <label for="username">Username</label>

                    <input
                        type="text"
                        id="username"
                        name="username"
                        autocomplete="username"
                        required
                    >
                </div>

                <div class="input-group">
                    <label for="password">Password</label>

                    <input
                        type="password"
                        id="password"
                        name="password"
                        autocomplete="current-password"
                        required
                    >
                </div>

    <button
        type="submit"
        class="hero-button"
        id="loginButton"
    >
        Log In
    </button>

    <p id="loginMessage" class="login-message"></p>
</form>

            <div class="login-footer">
                <p>Having trouble signing in?</p>
                <a href="inquiry.html">Contact Collective</a>
            </div>
        </div>
    </main>

</body>
</html>
